version: '3.8'

services:
  # Base de Datos Principal (Multitenant)
  postgres:
    image: postgres:15
    container_name: saberplay-db
    environment:
      POSTGRES_DB: saberplay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"

  # Caché para el Motor de Preguntas (Performance)
  redis:
    image: redis:7-alpine
    container_name: saberplay-cache
    ports:
      - "6379:6379"

  # Bus de Eventos para la IA Adaptativa
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
